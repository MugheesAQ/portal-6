version: '3.8'

services:
  api-gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - citizen-service

  auth-service:
    image: node:18-alpine
    environment:
      - REDIS_URL=redis://redis:6379
      - DB_HOST=postgres

  citizen-service:
    image: node:18-alpine
    environment:
      - DB_HOST=postgres
      
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=local_demo_secret
      - POSTGRES_DB=citizen_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
